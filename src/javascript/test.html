<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Title</title>
	</head>
	<body>
		<label>测试</label>
		<input maxlength="10" />

		<script type="module">
			const arr = ['a', 'b', 'c', 'd', 'e'];

			function swapArr(arr, index1, index2) {
				arr.splice(
					index1 - 1,
					1,
					...arr.splice(index2 - 1, 1, arr[index1 - 1])
				);
				return arr;
			}

			console.log(swapArr(arr, 1, 2));
		</script>
	</body>
</html>
